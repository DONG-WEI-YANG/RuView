; WiFi Body CSI Node — PlatformIO build config
[env]
platform = espressif32
framework = espidf
board = esp32-s3-devkitc-1
monitor_speed = 115200

; Source files are in main/
src_dir = main
include_dir = main

[env:node1]
upload_port = COM4
sdkconfig_defaults = sdkconfig.defaults, sdkconfig.node1

[env:node2]
upload_port = COM5
sdkconfig_defaults = sdkconfig.defaults, sdkconfig.node2
